services:
  db:
    container_name: todo_db
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    ports:
      - "15432:5432"
    # wait for db
    healthcheck:
        test: ["CMD", "pg_isready", "-U", "postgres"]
        interval: 5s
        timeout: 5s
        retries: 5
    networks:
      - todo-network

  redis:
    container_name: todo_redis
    image: redis:7-alpine
    ports:
      - "16379:6379"
    # wait for redis
    healthcheck:
        test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
        interval: 5s
        timeout: 5s
        retries: 5
    networks:
      - todo-network

  api:
    container_name: todo_api
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      # DEBUG: 'False'
      DATABASE_HOST: db
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/api:/backend/api
      - ./backend/core:/backend/core
      - ./backend/cards:/backend/cards
      - ./backend/users:/backend/users
      - ./backend/manage.py:/backend/manage.py
    command: >
      bash -c "python manage.py migrate &&
              python manage.py collectstatic --noinput &&
              python manage.py load_all_data &&
              python manage.py runserver 0.0.0.0:8000"
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    links:
      - db
      - redis
    networks:
      - todo-network

  celery:
    container_name: todo_celery
    restart: always
    build:
      context: ./backend
    # -A refers to your Django project/module where celery.py is defined.
    command: celery -A api worker -l INFO --concurrency=2 -B -s celerybeat-schedule
    env_file:
      - ./backend/.env
    environment:
      DATABASE_HOST: db
      REDIS_HOST: redis
    depends_on:
      - db
      - redis
      - api
    networks:
      - todo-network

  web:
    container_name: todo_web
    build: ./frontend
    environment:
      # set proxy for docker
      REACT_APP_PROXY: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      # - ./frontend:/frontend
      - ./frontend/public:/frontend/public
      - ./frontend/src:/frontend/src
      - ./frontend/package-lock.json:/frontend/package-lock.json
      - ./frontend/package.json:/frontend/package.json
    depends_on:
      - db
      - redis
      - api
      - celery
    networks:
      - todo-network

networks:
  todo-network:
    driver: bridge
